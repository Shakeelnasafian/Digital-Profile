services:

  # ---- Web Server ----
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-network

  # ---- PHP Application ----
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - app-network

  # ---- Database ----
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: shakeel1234
      MYSQL_DATABASE: digital_profile
      MYSQL_USER: myuser
      MYSQL_PASSWORD: shakeel123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  # ---- Cache & Queues ----
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - app-network

  # ---- Queue Worker (Horizon) ----
  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:listen --tries=3
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - app-network

  # ---- Scheduler (Cron) ----
  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - app-network

  # ---- Email Testing ----
  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - app-network

  # ---- Database GUI ----
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: myuser
      PMA_PASSWORD: shakeel123
    depends_on:
      - mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
