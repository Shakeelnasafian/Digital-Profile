services:
  dp-nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      dp-php:
        condition: service_healthy
    networks:
      - shared-network

  dp-php:
      build:
        context: .
        dockerfile: docker/php/Dockerfile
      volumes:
        - .:/var/www/html
      networks:
        shared-network:
          aliases:
            - dp-php
      healthcheck:
        test: ["CMD", "php-fpm", "-t"]
        interval: 10s
        timeout: 5s
        retries: 3
        start_period: 30s

  dp-horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:listen --tries=3
    volumes:
      - .:/var/www/html
    networks:
      - shared-network

  dp-scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    volumes:
      - .:/var/www/html
    networks:
      - shared-network

networks:
  shared-network:
    external: true
    name: shared-network